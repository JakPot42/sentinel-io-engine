services:
  - type: web
    name: sentinel-influence-ops
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DEMO_MODE
        value: "True"
      - key: PYTHON_VERSION
        value: "3.11.9"
