<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}{{ app_title }}{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>

{% if demo_mode %}
<div class="demo-banner">⚠ {{ demo_banner }}</div>
{% endif %}

<nav>
  <a href="/" class="nav-brand">SENTINEL <span>// IO DETECTION</span></a>
  <a href="/" {% if request.url.path == "/" %}class="active"{% endif %}>Dashboard</a>
  <a href="/reports" {% if "/report" in request.url.path %}class="active"{% endif %}>Intel Reports</a>
  <a href="/sources" {% if "/sources" in request.url.path %}class="active"{% endif %}>Source Monitor</a>
</nav>

<main>
  {% block content %}{% endblock %}
</main>

</body>
</html>
